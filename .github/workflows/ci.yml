name: "CI"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

on: [pull_request]

permissions:
  contents: read
  pull-requests: write

jobs:
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # 2.37.0
        with:
          php-version: "8.4"
          coverage: pcov

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Create coverage directory
        run: mkdir -p coverage

      - name: Run unit tests with coverage
        run: composer test:coverage

      - name: Upload unit coverage
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-unit
          path: coverage/unit.cov
          retention-days: 1

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        ports:
          - 13306:3306
        env:
          MYSQL_ROOT_PASSWORD: test
          MYSQL_DATABASE: query_test
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      mariadb:
        image: mariadb:11
        ports:
          - 13307:3306
        env:
          MARIADB_ROOT_PASSWORD: test
          MARIADB_DATABASE: query_test
        options: >-
          --health-cmd="mariadb-admin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      postgres:
        image: pgvector/pgvector:pg16
        ports:
          - 15432:5432
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: query_test
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      clickhouse:
        image: clickhouse/clickhouse-server:24
        ports:
          - 18123:8123
          - 19000:9000
        env:
          CLICKHOUSE_DB: query_test
        options: >-
          --health-cmd="wget --spider -q http://localhost:8123/ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd="mongosh --eval 'db.runCommand({ping:1})'"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # 2.37.0
        with:
          php-version: '8.4'
          extensions: pdo, pdo_mysql, pdo_pgsql, mongodb
          coverage: pcov

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Create coverage directory
        run: mkdir -p coverage

      - name: Run integration tests with coverage
        run: composer test:integration:coverage

      - name: Upload integration coverage
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-integration
          path: coverage/integration.cov
          retention-days: 1

  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [unit, integration]

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # 2.37.0
        with:
          php-version: "8.4"
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Download unit coverage
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: coverage-unit
          path: coverage

      - name: Download integration coverage
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: coverage-integration
          path: coverage

      - name: Merge coverage
        run: |
          ./vendor/bin/phpcov merge \
            --clover coverage/combined.xml \
            --text coverage/combined.txt \
            coverage

      - name: Parse coverage summary
        id: coverage
        run: |
          php -r '
            $xml = simplexml_load_file("coverage/combined.xml");
            $metrics = $xml->project->metrics;
            $lineRate = (int) $metrics["statements"] > 0
              ? 100 * (int) $metrics["coveredstatements"] / (int) $metrics["statements"]
              : 0;
            $branchRate = (int) $metrics["conditionals"] > 0
              ? 100 * (int) $metrics["coveredconditionals"] / (int) $metrics["conditionals"]
              : 0;
            $methodRate = (int) $metrics["methods"] > 0
              ? 100 * (int) $metrics["coveredmethods"] / (int) $metrics["methods"]
              : 0;
            $classRate = (int) $metrics["classes"] > 0
              ? 100 * (int) $metrics["coveredclasses"] / (int) $metrics["classes"]
              : 0;
            $out = sprintf(
              "lines=%.2f\nbranches=%.2f\nmethods=%.2f\nclasses=%.2f\n",
              $lineRate, $branchRate, $methodRate, $classRate
            );
            file_put_contents(getenv("GITHUB_OUTPUT"), $out, FILE_APPEND);
          '

      - name: Write coverage to job summary
        env:
          LINES: ${{ steps.coverage.outputs.lines }}
          BRANCHES: ${{ steps.coverage.outputs.branches }}
          METHODS: ${{ steps.coverage.outputs.methods }}
          CLASSES: ${{ steps.coverage.outputs.classes }}
        run: |
          {
            echo "## Coverage summary (unit + integration)"
            echo ""
            echo "| Metric | Covered |"
            echo "|---|---|"
            echo "| Lines | ${LINES}% |"
            echo "| Branches | ${BRANCHES}% |"
            echo "| Methods | ${METHODS}% |"
            echo "| Classes | ${CLASSES}% |"
            echo ""
            echo "<details><summary>Per-file coverage</summary>"
            echo ""
            echo '```'
            head -200 coverage/combined.txt
            echo '```'
            echo ""
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Post coverage comment
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          header: coverage
          message: |
            ## 📊 Coverage (unit + integration)

            | Metric | Covered |
            |---|---|
            | Lines | **${{ steps.coverage.outputs.lines }}%** |
            | Branches | **${{ steps.coverage.outputs.branches }}%** |
            | Methods | **${{ steps.coverage.outputs.methods }}%** |
            | Classes | **${{ steps.coverage.outputs.classes }}%** |

            Full per-file breakdown in the [job summary](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).
